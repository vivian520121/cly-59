<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="1 0 0 0 0.75
                                           0 1 0 0 0.65
                                           0 0 1 0 0.45
                                           0 0 0 0.08 0"/>
    </filter>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#EDE7D8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E5DDC8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#paperGrad)"/>
  <rect width="100%" height="100%" filter="url(#noise)"/>
</svg>
